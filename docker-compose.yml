name: iidp-backend-demo-ai

services:
  mysql:
    image: mysql:8.0
    container_name: iidp-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iidp_demo}
      MYSQL_USER: ${MYSQL_USER:-iidp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-iidp123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_connections=500
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: iidp-demo-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      TZ: Asia/Shanghai
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: iidp-demo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-snest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-12345678}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: iidp-demo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-snest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-12345678}
      MINIO_BUCKET: ${MINIO_BUCKET:-apps}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb -p "local/$${MINIO_BUCKET}" || true
        mc anonymous set download "local/$${MINIO_BUCKET}" || true

  iidp-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iidp-backend-demo-ai:local
    container_name: iidp-demo-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8060}:8060"
    volumes:
      - ./apps:/apps
      - ./docker/config:/config:ro
      - iidp_logs:/logs

volumes:
  mysql_data:
  redis_data:
  minio_data:
  iidp_logs:
